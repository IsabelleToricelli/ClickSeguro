name: DevSecOps - ClickSeguro Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Testes de Segurança Automatizados
    steps:
      # 1. Checkout do código do seu repositório
      - name: Checkout do Código
        uses: actions/checkout@v4

      # 2. Sobe o servidor para hospedar seu HTML, CSS e JS
      - name: Iniciar Servidor da Aplicação
        run: |
          # Inicia um servidor Python na porta 8080 em segundo plano
          python3 -m http.server 8080 & 
          # Aguarda 5 segundos para garantir que o servidor esteja online
          sleep 5 

      # 3. Executa o OWASP ZAP Full Scan (Item 1 e 2 da atividade)
      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:8080/cadastro.html'
          # Define que o pipeline deve falhar se encontrar alertas
          fail_action: true 
          # Nome do artefato que será gerado (Item 5 da atividade)
          artifact_name: 'relatorio-zap-clickseguro' 
          # Configurações adicionais para falhar em vulnerabilidades Altas (Item 2)
          cmd_options: '-z "-config scanner.attackOnStart=true"'

      # 4. Upload do Relatório como Artefato (Garante que você possa baixar o HTML)
      - name: Salvar Evidências (Relatório HTML)
        if: always() # Garante que o relatório seja salvo mesmo se o scan falhar
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-html
          path: 'zap_report.html' 
