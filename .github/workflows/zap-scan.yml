name: DevSecOps - ClickSeguro Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Testes de Segurança Automatizados
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Iniciar Servidor da Aplicação
        run: |
          python3 -m http.server 8080 & 
          sleep 5 

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:8080/cadastro.html'
          fail_action: true 
          artifact_name: 'relatorio-zap-clickseguro'

      - name: Salvar Evidências (Relatório HTML)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-html
          path: 'zap_report.html'
